  mainSections = ["ai", "azure", "devops", "finops", "terraform", "az-104"]
  blogDir = "AI"
  mobileNavigation = "left"
  enforceLightMode = false

  codeMaxLines = 12
  codeLineNumbers = false
  numberOfTagsShown = 18

  customCSS = ["css/custom.css"]

[params.author]
