name: Daily Cloud and AI Blog Publish

on:
  workflow_dispatch:
  schedule:
    # 19:00 IST = 13:30 UTC
    - cron: '30 13 * * *'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout GitHub Pages repo
        uses: actions/checkout@v4
        with:
          repository: KasdevTech/kasdevtech.github.io
          path: site_repo
          token: ${{ github.token }}
          submodules: recursive

      - name: Verify Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama --version

      - name: Start Ollama service and pull model
        env:
          OPENAI_MODEL: ${{ vars.OLLAMA_MODEL || 'qwen2.5:1.5b' }}
        run: |
          ollama serve > /tmp/ollama.log 2>&1 &
          sleep 6
          pull_with_retry () {
            local model="$1"
            for attempt in 1 2 3; do
              if ollama pull "$model"; then
                return 0
              fi
              echo "Pull failed for $model (attempt $attempt/3). Retrying..."
              sleep $((attempt * 10))
            done
            return 1
          }

          selected_model=""
          for candidate in "$OPENAI_MODEL" "qwen2.5:1.5b" "llama3.2:3b"; do
            if [ -z "$candidate" ]; then
              continue
            fi
            if pull_with_retry "$candidate"; then
              selected_model="$candidate"
              break
            fi
          done

          if [ -z "$selected_model" ]; then
            echo "Failed to pull any fallback model."
            exit 1
          fi

          echo "OPENAI_MODEL=$selected_model" >> "$GITHUB_ENV"
          echo "Using model: $selected_model"
          ollama list

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.8'
          extended: true

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Configure Git Identity (site repo)
        run: |
          git -C site_repo config user.name "github-actions[bot]"
          git -C site_repo config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run publisher
        env:
          OPENAI_MODEL: ${{ env.OPENAI_MODEL }}
          OPENAI_BASE_URL: http://127.0.0.1:11434/v1

          PUBLISH_WORDPRESS: "false"
          LINKEDIN_ENABLED: "false"

          TIMEZONE: Asia/Kolkata
          RUN_HOUR_24: 19
          RUN_MINUTE: 0
          POSTS_PER_RUN: 2
          LOOKBACK_HOURS: 36
          TOPICS: AI,Azure,Azure DevOps,AKS,Microsoft Entra,MCP,Model Context Protocol,LangChain,LangGraph,LlamaIndex,OpenAI,Anthropic,Gemini,Vertex AI,Azure AI,Azure OpenAI,Azure Databricks,Microsoft Fabric,AWS,AWS AI,Amazon Bedrock,SageMaker,Google Cloud AI,Google Cloud,Cloudflare AI,Kubernetes,Docker,Terraform,FinOps,DevOps,Cloud Security,Platform Engineering,DevSecOps,Observability,Datadog,Prometheus
          EXTRA_RSS_FEEDS: ${{ secrets.EXTRA_RSS_FEEDS }}
          GITHUB_PAGES_REPO_PATH: ${{ github.workspace }}/site_repo
          GITHUB_PAGES_POSTS_DIR: content
          GITHUB_PAGES_AUTO_COMMIT: "true"
          GITHUB_PAGES_AUTO_PUSH: "true"
          PUBLISHED_STATE_FILE: ${{ github.workspace }}/site_repo/.agent_state/published_sources.txt
        run: python3 -m aiblog_agent.main run-once

      - name: Regenerate Hugo docs and push (for branch-based Pages)
        run: |
          cd site_repo
          hugo -d docs
          if ! git diff --quiet -- docs; then
            git add docs
            git commit -m "Regenerate Hugo docs from AI publish run"
            git push
          else
            echo "No docs changes to commit"
          fi
