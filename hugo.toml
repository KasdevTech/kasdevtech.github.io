    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    lineNos = false
    style = "github"

[params]
  logo = "images/kasdev-3d.png"
  introDescription = "Enterprise-grade cloud and AI engineering blogs on Azure, DevOps, FinOps, Terraform, and modern AI platforms."
